<h1>附則（国家ごとの法律追加について）</h1>

<p>この文書は「法律」ではなく、サーバー全体の秩序を保つための<b>最低限の共通ルール</b>です。</p>

<p>各国家は以下を自由に行うことができます。</p>

<ul>
  <li>自国の法律（ローカル法）の制定</li>
  <li>国内ルールの追加</li>
  <li>経済制度の設定</li>
  <li>国境管理の詳細規定</li>
  <li>国の建築・保護ルールの設定</li>
</ul>

<p>ただし、これらのローカル法は<b>サーバー共通ルール（基本法）に反してはならない</b>ものとします。</p>
