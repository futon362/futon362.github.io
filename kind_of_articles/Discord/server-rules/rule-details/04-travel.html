<h1>第4章　旅行・通過</h1>

<h2>第4条　旅行・通過の自由</h2>

<ol>
    <li>プレイヤーは他国領地を旅行・通過する権利を有する。  
    <li>通過には「通行許可」を求めることができる。  
    <li>通過中のプレイヤーは非戦闘員として保護され、攻撃を禁止する。  
    <li>無許可侵入は違法とするが、攻撃は禁止し、警告・退去要求のみ可能とする。
</ol>
